<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="50%" style="stop-color:#7C6CF7"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#E0D7FF;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6C5CE7" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Abstract flow lines representing talent flow -->
  <g transform="translate(256, 240)">
    <!-- Person silhouette (top) - simplified -->
    <circle cx="0" cy="-95" r="32" fill="url(#flowGrad)" opacity="0.95"/>
    <path d="M-45,-50 Q-45,-25 -30,-15 Q0,5 30,-15 Q45,-25 45,-50" fill="url(#flowGrad)" opacity="0.9" stroke="none"/>
    <!-- Flow arrow / funnel lines -->
    <path d="M-90,20 C-60,20 -40,55 0,55 C40,55 60,20 90,20" fill="none" stroke="url(#flowGrad)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <path d="M-70,50 C-40,50 -25,80 0,80 C25,80 40,50 70,50" fill="none" stroke="url(#flowGrad)" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
    <path d="M-50,80 C-25,80 -15,105 0,105 C15,105 25,80 50,80" fill="none" stroke="url(#flowGrad)" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <!-- Arrow tip at bottom -->
    <polygon points="-14,115 0,140 14,115" fill="url(#flowGrad)" opacity="0.7"/>
  </g>
</svg>
